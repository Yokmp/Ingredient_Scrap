[mod-setting-description]
yis-needed=Base value for recycling recipes. Affects the required scrap amount, generated fluid amounts, and scrap stack size.
yis-probability=Probability of getting scrap.
yis-fixed-amount=Creates fixed scrap amounts with amount. When disabled, random ranges with amount_min and amount_max are generated.
yis-amount-limit=Smooths very large ingredient amounts so recipes with extreme inputs do not create excessive scrap. When disabled, scrap is calculated linearly from ingredient amount and probability.\n\nBe aware that disabling both options ([img=sigma-symbol] and [img=fixed-symbol]) can behave similarly to a cost reduction.
yis-hide-tech=Hides the automatically generated recycling technologies in the technology tree. When short logging is enabled, these technologies stay visible so in-game testing is easier to follow.
yis-material-mode=Controls how Ingredient Scrap treats this material: auto uses normal detection, solid forces solid materials only, fluid forces fluid materials only, both forces both, and none ignores the material completely.
yis-shallow-log=Writes short summaries of important mod steps to the Factorio log file. Useful for bug reports and can be disabled when the log should stay quiet.
yis-fluid-recipes=Detects matching fluid ingredients such as molten-* or *-solution, creates scrap from them, and adds extra recycling recipes back into matching fluids. When disabled, fluid ingredients and fluid recycling are ignored.
