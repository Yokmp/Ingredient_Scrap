[mod-setting-name]
yis-needed=Recycling-Basiswert
yis-probability= Wahrscheinlichkeit für Schrott
yis-fixed-amount=Feste Schrottmengen
yis-amount-limit=Große Schrottmengen glätten
yis-hide-tech=Recycling-Technologien verstecken
yis-shallow-log=Kurzes Logging
yis-fluid-recipes=Fluid-Schrott und Fluid-Recycling

[mod-setting-description]
yis-needed=Basiswert für Recycling-Rezepte. Beeinflusst unter anderem die benötigte Schrottmenge, erzeugte Fluidmengen und die Stapelgröße von Schrott.
yis-probability=Wie wahrscheinlich es ist Schrott zu erhalten.
yis-fixed-amount=Erzeugt feste Schrottmengen mit amount. Wenn deaktiviert, werden zufällige Bereiche mit amount_min und amount_max erzeugt.
yis-amount-limit=Glättet sehr große Zutatenmengen, damit Rezepte mit extrem hohen Eingaben nicht übermäßig viel Schrott erzeugen. Wenn deaktiviert, wird die Schrottmenge linear aus Zutatenmenge und Wahrscheinlichkeit berechnet.\n\nAchtung: Das Deaktivieren beider Optionen ([img=sigma-symbol] und [img=fixed-symbol]) kann ähnlich wie eine Kostenreduktion wirken.
yis-hide-tech=Versteckt die automatisch erzeugten Recycling-Technologien im Technologiebaum. Wenn kurzes Logging aktiv ist, bleiben diese Technologien trotzdem sichtbar, damit Tests im Spiel leichter nachvollziehbar sind.
yis-shallow-log=Schreibt kurze Zusammenfassungen wichtiger Mod-Schritte in die Factorio-Logdatei. Hilft bei Bugreports und kann deaktiviert werden, wenn die Logdatei möglichst ruhig bleiben soll.
yis-fluid-recipes=Erkennt passende Fluid-Zutaten wie molten-* oder *-solution, erzeugt daraus Schrott und erstellt zusätzliche Recycling-Rezepte zurück in passende Fluide. Wenn deaktiviert, werden Fluid-Zutaten und Fluid-Recycling ignoriert.
